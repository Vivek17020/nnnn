  </a>

          <a class="nav-link" routerLink="/add_flights">Add Flights</a>

        <li class="nav-item">
          <a class="nav-link" routerLink="/view_all_user">View All Bookings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/assign_pilot">Assign Pilots</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/my_profile">My Profile</a>
        </li>
      </ng-container>

      <!-- Passenger links -->
      <ng-container *ngIf="isLoggedIn && role === 'PASSENGER'">
        <li class="nav-item">
          <a class="nav-link" routerLink="/search_flight">Search Flights</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/my_booking">My Bookings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/my_profile">My Profile</a>
        </li>
      </ng-container>

      <ng-container *ngIf="isLoggedIn && role === 'PILOT'">
        <li class="nav-item">
          <a class="nav-link" routerLink="/assign_pilot">My Schedule</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/my_profile">My Profile</a>

        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm ms-1" (click)="logout()">Logout</button>
