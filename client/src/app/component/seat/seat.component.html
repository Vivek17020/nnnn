
<div class="seat-map-wrap" *ngIf="seatMap.length > 0">
  <div class="seat-map-header">
    <span class="seat-map-title">
      <i class="fa-solid fa-chair"></i>
      Select Seats
    </span>
    <span class="seat-map-counter">
      <span class="seat-selected">{{ selectedSeats.length }}</span>
      <span class="seat-sep">/</span>
      <span class="seat-max">{{ maxSelectable }}</span>
      selected
    </span>
  </div>

  <!-- Airplane cabin visual -->
  <div class="seat-cabin">
    <div class="cabin-nose">
      <i class="fa-solid fa-plane"></i>
    </div>

    <div *ngFor="let row of seatMap" class="seat-row">
      <div *ngFor="let seat of row" class="seat-cell">
        <div *ngIf="seat.isEmergencyExist" class="emergency-label">
          <i class="fa-solid fa-door-open"></i> EXIT
        </div>
        <button
          type="button"
          class="seat-btn"
          [class.seat-available]="!seat.booked && !seat.isBlocked && !isSelected(seat.seatNumber)"
          [class.seat-selected]="isSelected(seat.seatNumber)"
          [class.seat-booked]="seat.booked"
          [class.seat-blocked]="seat.isBlocked && !seat.booked"
          [class.seat-emergency]="seat.isEmergencyExist && !seat.booked && !seat.isBlocked"
          [disabled]="seat.booked || seat.isBlocked"
          (click)="selectSeat(seat)"
          [title]="getSeatTooltip(seat)">
          {{ seat.seatNumber }}
          <span *ngIf="seat.isXL" class="seat-xl-badge">XL</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Legend -->
  <div class="seat-legend">
    <div class="legend-item">
      <span class="legend-dot legend-available"></span>
      <span>Available</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot legend-selected"></span>
      <span>Selected</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot legend-booked"></span>
      <span>Booked</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot legend-blocked"></span>
      <span>Blocked</span>
    </div>
    <div class="legend-item" *ngIf="hasEmergencySeats">
      <span class="legend-dot legend-emergency"></span>
      <span>Emergency Exit</span>
    </div>
    <div class="legend-item" *ngIf="hasXLSeats">
      <span class="legend-dot legend-xl"></span>
      <span>XL Legroom</span>
    </div>
  </div>
</div>

<div class="seat-empty" *ngIf="seatMap.length === 0">
  <i class="fa-solid fa-chair"></i>
  <small>No seat map available for this flight</small>
</div>
