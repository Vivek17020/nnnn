<div class="seat-map">

  <div *ngIf="error" class="alert alert-warning">
    Unable to load seats.
  </div>

  <div *ngIf="loading" class="text-center">
    Loading seat map...
  </div>

  <div class="d-flex flex-wrap gap-2" *ngIf="!loading && seats.length">

    <!-- ✅ ADD ngFor HERE -->
    <button *ngFor="let seat of seats"
      type="button"
      class="btn btn-sm"

      [ngClass]="{
        'btn-success': seat?.isAvailable && !seat?.isBlocked && !isSelected(seat),
        'btn-primary': isSelected(seat),
        'btn-secondary': !seat?.isAvailable || seat?.isBlocked
      }"

      [disabled]="!seat?.isAvailable || seat?.isBlocked"

      (click)="selectSeat(seat)">

      {{ seat?.seatNumber }}

    </button>
  </div>

  <p *ngIf="!loading && !seats.length" class="text-muted">
    No seats available for this flight.
  </p>

</div>
