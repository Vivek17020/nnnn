<div class="text-center mt-5">
  <h2>Welcome to Airline Booking System</h2>
  <p class="text-muted">
    Hello, <strong>{{ username }}</strong> — logged in as <strong>{{ role }}</strong>
  </p>

  <div class="mt-4" *ngIf="role === 'ADMIN'">
    <a routerLink="/add_flights" class="btn btn-primary me-2">Manage Flights</a>
    <a routerLink="/view_all_user" class="btn btn-secondary me-2">View All Bookings</a>
    <a routerLink="/assign_pilot" class="btn btn-info me-2">Assign Pilots</a>

    <a routerLink="/my_profile" class="btn btn-outline-secondary">My Profile</a>
  </div>

  <div class="mt-4" *ngIf="role === 'PASSENGER'">
    <a routerLink="/search_flight" class="btn btn-primary me-2">Search Flights</a>
    <a routerLink="/my_booking" class="btn btn-secondary me-2">My Bookings</a>
    <a routerLink="/my_profile" class="btn btn-info">My Profile</a>
  </div>

  <div class="mt-4" *ngIf="role === 'PILOT'">
    <a routerLink="/assign_pilot" class="btn btn-primary me-2">My Schedule</a>
    <a routerLink="/my_profile" class="btn btn-info">My Profile</a>
  </div>
</div>
