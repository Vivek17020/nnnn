<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="brand-icon">🔐</div>
      <h2>Reset Password</h2>
      <p>Enter the OTP sent to your email and choose a new password</p>
    </div>

    <div class="alert alert-danger" *ngIf="showError">
      <span class="alert-icon">⚠</span> {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!success" class="form-body">

      <!-- OTP -->
      <div class="form-group">
        <label class="form-label">One-Time Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔢</span>
          <input type="text"
                 [(ngModel)]="otp"
                 [ngModelOptions]="{standalone: true}"
                 class="form-control otp-field"
                 placeholder="000000"
                 maxlength="6"
                 inputmode="numeric"
                 autocomplete="one-time-code">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" formControlName="password" class="form-control" placeholder="Enter new password" autocomplete="new-password">
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrapper">
          <span class="input-icon">✅</span>
          <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Re-enter new password" autocomplete="new-password">
        </div>
      </div>

      <div class="field-error mismatch" *ngIf="form.errors?.['mismatch']">
        Passwords do not match
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span class="btn-spinner" *ngIf="loading">⟳</span>
        <span>{{ loading ? 'Resetting...' : 'Reset Password' }}</span>
      </button>

    </form>

    <div *ngIf="success" class="success-box">
      <div class="success-icon">✅</div>
      <p>Password reset successful!</p>
      <p class="hint">You can now sign in with your new password.</p>
    </div>

    <div class="auth-footer">
      <a routerLink="/login">← Back to Login</a>
    </div>

  </div>
</div>
