<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-4">Register</h3>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" formControlName="username" />
            <div class="text-danger" *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">Username is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" />
            <div class="text-danger" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">Valid email is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password" />
            <div class="text-danger" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">Password is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="text" class="form-control" formControlName="contactNumber" />
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" formControlName="role">
              <option value="">Select role</option>
              <option value="ADMIN">ADMIN</option>
              <option value="PASSENGER">PASSENGER</option>
              <option value="PILOT">PILOT</option>
            </select>
            <div class="text-danger" *ngIf="registerForm.get('role')?.invalid && registerForm.get('role')?.touched">Role is required.</div>
          </div>
          <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
        <div class="alert alert-success mt-3" *ngIf="showMessage">Registration successful.</div>
        <div class="alert alert-danger mt-3" *ngIf="showError">{{ errorMessage }}</div>
      </div>
    </div>
  </div>
</div>
