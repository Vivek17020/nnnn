<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-4">Login</h3>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" formControlName="username" />
            <div class="text-danger" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">Username is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password" />
            <div class="text-danger" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">Password is required.</div>
          </div>
          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
        <div class="alert alert-success mt-3" *ngIf="showMessage">Login successful. Redirecting...</div>
        <div class="alert alert-danger mt-3" *ngIf="showError">{{ errorMessage }}</div>
      </div>
    </div>
  </div>
</div>
